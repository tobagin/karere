app-id: io.github.tobagin.karere.Dev
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: karere
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-download
  - --filesystem=xdg-run/pipewire-0

  # Audio for notification sounds and media
  - --socket=pulseaudio
  # Configure WebKit spell checker dictionary paths (bundled and runtime)
  - --env=WEBKIT_SPELL_CHECKER_DIR=/app/share/hunspell
  # Force GStreamer/WebKit to use PipeWire for camera
  - --env=GST_PLUGIN_FEATURE_RANK=pipewiresrc:MAX
  - --env=WEBRTC_USE_PIPEWIRE=1
  # Disable JIT to fix "NeedDebuggerBreak trap" crashes
  - --env=JSC_useJIT=0
  # Enable SharedArrayBuffer without requiring cross-origin isolation
  - --env=JSC_useSharedArrayBuffer=1


sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: '25.08'
    add-ld-path: .

cleanup-commands:
  - mkdir -p ${FLATPAK_DEST}/lib/ffmpeg

cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - '*.la'
  - '*.a'

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/karere/cargo

modules:
  - name: unifdef
    buildsystem: simple
    build-commands:
      - make install prefix=/app CFLAGS="-std=c11 -D_XOPEN_SOURCE=700"
    sources:
      - type: archive
        url: https://dotat.at/prog/unifdef/unifdef-2.12.tar.xz
        sha256: 43ce0f02ecdcdc723b2475575563ddb192e988c886d368260bc0a63aee3ac400

  - name: webkitgtk
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      cflags: '-g0'
      cxxflags: '-g0 -DNDEBUG'
      env:
        # Limit parallel jobs to avoid OOM
        NINJA_MAX_JOBS: '4'
    config-opts:
      - -DPORT=GTK
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      # Enable WebRTC
      - -DENABLE_WEB_RTC=ON
      - -DENABLE_MEDIA_STREAM=ON
      # Keep what we need
      - -DENABLE_WEBDRIVER=OFF
      - -DENABLE_MINIBROWSER=OFF
      - -DENABLE_DOCUMENTATION=OFF
      - -DENABLE_INTROSPECTION=OFF
      - -DENABLE_GAMEPAD=OFF
      - -DENABLE_BUBBLEWRAP_SANDBOX=OFF
      - -DENABLE_SPEECH_SYNTHESIS=OFF
      - -DUSE_SOUP2=OFF
      - -DUSE_GTK4=ON
      - -DUSE_LIBBACKTRACE=OFF
    sources:
      - type: archive
        url: https://webkitgtk.org/releases/webkitgtk-2.50.5.tar.xz
        sha256: 8737631bac3e9c7ad3e5208f9370e076c09d9c45b39980021ce54edadcc6f94f

  - name: hunspell-dictionaries
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/hunspell
      - |
        find . -type f \( -name "*.dic" -o -name "*.aff" \) ! -path "*/hyph_*" ! -path "*/.git/*" ! -path "*/util/*" | while read -r file; do
          filename=$(basename "$file")
          if [[ ! "$filename" =~ ^hyph_ ]]; then
            install -Dm644 "$file" "/app/share/hunspell/$filename"
          fi
        done
    sources:
      - type: archive
        url: https://github.com/LibreOffice/dictionaries/archive/refs/tags/libreoffice-26.2.0.2.zip
        sha256: 4b076ff20485af78036fc896804754c64f760b227aa692de84200f762ee471bc

  - name: karere
    buildsystem: meson
    config-opts:
      - -Dprofile=development
    sources:
      - type: dir
        path: ..
    build-options:
      build-args:
        - --share=network